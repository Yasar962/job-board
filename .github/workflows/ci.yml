name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build user-service
        run: cd user-service && mvn clean package -DskipTests
      - name: Build job-service
        run: cd job-service && mvn clean package -DskipTests
      - name: Build notification-service
        run: cd notification-service && mvn clean package -DskipTests
      - name: Build ai-service
        run: cd ai-service && mvn clean package -DskipTests