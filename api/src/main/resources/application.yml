server:
  port: 8080
spring:
  main:
    web-application-type: servlet
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/api/users/**
            - id: job-service
              uri: http://job-service:8082
              predicates:
                - Path=/api/jobs/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.boot.context.properties: TRACE